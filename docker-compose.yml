services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      ADMIN_OWNER_ACCOUNT: ${ADMIN_OWNER_ACCOUNT}
      MAINTENANCE_MODE: ${MAINTENANCE_MODE}
      MAINTENANCE_BYPASS_KEY: ${MAINTENANCE_BYPASS_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      DATABASE_URL: mysql://${DB_USERNAME}:${DB_PASSWORD}@db:3306/${DB_DATABASE}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GTM_ID: ${GTM_ID}
    ports:
      - "${APP_BIND_PORT:-18050}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const http = require(''http''); http.get(''http://localhost:3000'', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on(''error'', () => process.exit(1));"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - /var/lib/tristanbudd-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", 'mysqladmin ping -h localhost -uroot -p"$$DB_ROOT_PASSWORD" --silent']
      interval: 10s
      timeout: 5s
      retries: 12

